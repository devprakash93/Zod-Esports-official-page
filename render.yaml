databases:
  - name: zod-esports-db
    plan: free
    region: singapore

services:
  - type: web
    name: zod-esports-hub
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build:prod && npx prisma migrate deploy && npx tsx prisma/seed.ts
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zod-esports-db
          property: connectionString
